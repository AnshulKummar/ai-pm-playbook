name: Feature Request
description: Suggest a new section, skill, command, or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like to see added?
      description: Describe the new content or improvement
      placeholder: "A new chapter on using Claude Code for API design..."
    validations:
      required: true
  - type: dropdown
    id: level
    attributes:
      label: Which level does this belong in?
      options:
        - "Level 1: Foundations"
        - "Level 2: PM Productivity"
        - "Level 3: Advanced Mastery"
        - "Not sure"
    validations:
      required: true
  - type: dropdown
    id: type
    attributes:
      label: Content type
      options:
        - New chapter or section
        - New skill or command
        - New hook
        - Worked example (Act)
        - PM-to-Engineering concept bridge
        - Sample CLAUDE.md
        - Translation
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Why is this useful for PMs?
      description: Help us understand the value for the PM community
    validations:
      required: false
